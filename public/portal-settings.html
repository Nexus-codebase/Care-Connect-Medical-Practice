<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareConnect Portal Settings</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-page">
    <aside class="med-sidebar" aria-label="Portal sidebar navigation">
      <div class="med-logo">Medicare<span>Pro</span></div>
      <nav class="med-menu">
        <a href="portal.html">Dashboard</a>
        <a href="portal-patients.html">Patients</a>
        <a href="portal-appointments.html">Appointments</a>
        <a href="portal-notifications.html">Notifications</a>
        <a class="active" href="portal-settings.html">Settings</a>
      </nav>
    </aside>

    <main class="med-main">
      <section class="section">
        <div class="container reveal">
          <header class="topbar page-topbar">
            <h1>Settings</h1>
            <div class="dashboard-page-links">
              <a href="portal.html">Dashboard</a>
              <a href="portal-patients.html">Patients</a>
              <a href="portal-appointments.html">Appointments</a>
            </div>
          </header>
        </div>
      </section>

      <section class="section" id="profile-section">
        <div class="container portal-grid reveal">
          <form class="portal-card" id="profile-form" novalidate>
            <h2>Settings / Profile</h2>
            <label>Name<input type="text" name="name" id="profile-name" /></label>
            <label>New password<input type="password" name="password" minlength="6" /></label>
            <button class="btn btn-primary" type="submit">Save profile</button>
            <button class="btn btn-ghost" type="button" id="logout-button">Logout</button>
            <p class="form-feedback" id="profile-feedback" role="status" aria-live="polite"></p>
          </form>

          <article class="portal-card">
            <h2>System Status</h2>
            <p class="helper-text" id="system-status-text">Ready.</p>
            <p class="helper-text">Portal session uses browser storage for demo purposes.</p>
            <p class="helper-text"><a href="index.html">Back to public site</a></p>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="portal.js"></script>
  </body>
</html>

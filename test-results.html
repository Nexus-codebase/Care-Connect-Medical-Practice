<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to public/test-results.html</title>
    <meta http-equiv="refresh" content="0; url=public/test-results.html" />
    <link rel="canonical" href="public/test-results.html" />
    <script>
      (function () {
        var target = "public/test-results.html" + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>If you are not redirected automatically, <a href="public/test-results.html">open the site</a>.</p>
  </body>
</html>

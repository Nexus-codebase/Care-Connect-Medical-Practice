<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareConnect Portal Notifications</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-page">
    <aside class="med-sidebar" aria-label="Portal sidebar navigation">
      <div class="med-logo">Medicare<span>Pro</span></div>
      <nav class="med-menu">
        <a href="portal.html">Dashboard</a>
        <a href="portal-patients.html">Patients</a>
        <a href="portal-appointments.html">Appointments</a>
        <a class="active" href="portal-notifications.html">Notifications</a>
        <a href="portal-settings.html">Settings</a>
      </nav>
    </aside>

    <main class="med-main">
      <section class="section">
        <div class="container reveal">
          <header class="topbar page-topbar">
            <h1>Notifications</h1>
            <div class="dashboard-page-links">
              <a href="portal.html">Dashboard</a>
              <a href="portal-patients.html">Patients</a>
              <a href="portal-settings.html">Settings</a>
            </div>
          </header>
        </div>
      </section>

      <section class="section" id="notifications-section">
        <div class="container portal-grid reveal">
          <article class="portal-card">
            <h2>Notifications</h2>
            <ul class="flow-list compact-list" id="notifications-list"></ul>
          </article>

          <form class="portal-card" id="alert-form" novalidate>
            <h2>Open Alert (Patient/Appointment)</h2>
            <label>Title<input type="text" name="title" required /></label>
            <label>Message<textarea name="message" rows="3" required></textarea></label>
            <button class="btn btn-ghost" type="submit">Create alert</button>
            <p class="form-feedback" id="alert-feedback" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
